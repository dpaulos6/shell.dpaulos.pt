# PaulosShell default Starship config
# Copy to ~/.config/starship.toml or run: paulos starship config

add_newline = true
command_timeout = 1000

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = false
read_only = " 󰌾"

[git_branch]
symbol = " "

[git_status]
disabled = false

[nodejs]
symbol = " "

[package]
symbol = "󰏗 "

[dotnet]
symbol = " "

[cmd_duration]
min_time = 1000
format = "took [$duration]($style) "
